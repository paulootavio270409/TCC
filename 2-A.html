            color: white;

            border-bottom: 5px solid #1e3d1a;
        }




        :root {
            --primary: #007bff;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #e9ecef;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stats {
            text-align: center;
            border-bottom: 2px solid var(--primary);
            margin-bottom: 20px;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary);
        }

        .media {
            width: 100%;
            margin-top: 10px;
            border-radius: 5px;
        }

        .file-link {
            display: inline-block;
            margin-top: 10px;
            padding: 8px;

            border: 1px solid #ddd;
            text-decoration: none;

        }

            font-size: 0.8em;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }
    </style>
</head>

<body>

     <div id="main">
        <span class="menu-btn" onclick="openNav()">&#9776; SALAS</span>
    </div>

    <div id="mySidebar" class="sidebar">
      <a href="home.html">🏠 Home (Todas)</a>
      <a href="3-B.html">Turma 3-B</a>
      <a href="3-A.html">Turma 3-A</a>

      <a href="2-A.html">Turma 2-A</a>

      <a href="1-A.html">Turma 1-A</a>
      <a href="9-B.html">Turma 9-B</a>

    </div>

<div id="login" class="container">
    <h3>Login</h3>
    <input id="nome" placeholder="Nome">
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button class="btn" onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

    <div class="container stats">
        <h3>Mural da Turma</h3>
        <p>Atualmente temos <strong id="postContador">0</strong> postagens compartilhadas!</p>
    </div>

    <div class="container">
        <div>
            Olá, <strong id="userNome"></strong>!
            <button class="btn-danger" style="float: right; padding: 5px 10px;" onclick="logout()">Sair</button>
        </div>
    </div>

    <div class="container">
        <h3>Nova Postagem</h3>
        <select id="turma">
            <option value="GERAL">Todas</option>
            <option>9-A</option><option>9-B</option>
            <option>1-A</option><option>1-B</option>
            <option>2-A</option><option>2-B</option>
            <option>3-A</option><option>3-B</option>
        </select>
        <input id="titulo" placeholder="Título (opcional)">
        <textarea id="texto" placeholder="Escreva algo..."></textarea>
        <input id="link" placeholder="Link (opcional)">
        <input type="file" id="file">
        <p class="info-permissao">Arquivos podem ser lidos por você e pelo administrador.</p>
        <button class="btn" onclick="postar()">Publicar</button>
    </div>

    <div class="container">
        <h3>Mural</h3>
        <div id="mural"></div>
    </div>

</div>

<script>

    
     function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
        function closeNav() { document.getElementById("mySidebar").style.width = "0"; }

        function checarParametrosURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const salaDaUrl = urlParams.get('sala');
            if (salaDaUrl) {
                filtroTurmaAtual = salaDaUrl;
                const banner = document.getElementById('filtroAtivo');
                banner.style.display = 'block';
                banner.innerText = "📍 Você está na Sala: " + salaDaUrl;
                if(document.getElementById('taskTurma')) document.getElementById('taskTurma').value = salaDaUrl;
            }
        }
        
const ADMIN = {
    email: "paulootaviopintoabreu@gmail.com",
    senha: "PauloeClaudia@maceio2025"
};

let user = null;

// Função de contador atualizada para contar o GERAL (conforme seu pedido)
function atualizarContador() {
    let db = JSON.parse(localStorage.getItem("db")) || [];
    const totalGeral = db.length;
    
    const painelContador = document.getElementById('postContador');
    if (painelContador) {
        painelContador.innerText = totalGeral;
    }
}

function login() {
    const nome = document.getElementById('nome').value;
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;

    if(email === ADMIN.email && senha === ADMIN.senha){
        user = {nome:"ADMIN", email, role:"admin"};
    } else {
        if(!nome) return alert("Digite seu nome");
        user = {nome, email, role:"user"};
    }

    sessionStorage.setItem("user", JSON.stringify(user));
    iniciar();
}

function iniciar() {
    user = JSON.parse(sessionStorage.getItem("user"));
    if(!user) return;

    document.getElementById('login').style.display = "none";
    document.getElementById('app').style.display = "block";
    document.getElementById('userNome').innerText = user.nome;

    carregar();
}

function logout(){
    sessionStorage.clear();
    location.reload();
}

async function postar(){
    const texto = document.getElementById('texto').value;
    if(!texto) return alert("Escreva algo antes de postar!");

    const fileInput = document.getElementById('file');
    const file = fileInput.files[0];

    const post = {
        id: Date.now(),
        turma: document.getElementById('turma').value,
        autor: user.nome,
        email: user.email,
        titulo: document.getElementById('titulo').value,
        texto: texto,
        link: document.getElementById('link').value,
        midia: file ? await toBase64(file) : null,
        tipo: file ? file.type : null,
        nomeArquivo: file ? file.name : null
    };

    let db = JSON.parse(localStorage.getItem("db")) || [];
    db.push(post);
    localStorage.setItem("db", JSON.stringify(db));

    // Limpar campos
    document.getElementById('titulo').value="";
    document.getElementById('texto').value="";
    document.getElementById('link').value="";
    fileInput.value="";

    carregar();
}

function carregar(){
    const mural = document.getElementById("mural");
    mural.innerHTML = "";

    let db = JSON.parse(localStorage.getItem("db")) || [];

    db.slice().reverse().forEach(p => {
        let conteudoMidia = "";
        
        if(p.midia){
            if(p.tipo && p.tipo.includes("image")){
                conteudoMidia = `<img src="${p.midia}" class="media">`;
            } else if(p.tipo && p.tipo.includes("video")){
                conteudoMidia = `<video src="${p.midia}" controls class="media"></video>`;
            } else {
                conteudoMidia = `<a href="${p.midia}" download="${p.nomeArquivo || 'arquivo'}" class="file-link">📁 Baixar arquivo: ${p.nomeArquivo || 'Clique aqui'}</a>`;
            }
        }

        const podeGerenciar = (p.email === user.email || user.role === "admin");

        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
            <small><b>${p.autor}</b> - ${p.turma}</small>
            ${p.titulo ? `<h4>${p.titulo}</h4>` : ""}
            <p>${p.texto}</p>
            ${p.link ? `<p><a href="${p.link}" target="_blank">Abrir link externo</a></p>` : ""}
            ${conteudoMidia}
            <div style="margin-top:10px;">
                ${podeGerenciar ? `
                    <button class="btn" style="background:#6c757d" onclick="editar(${p.id})">Editar</button>
                    <button class="btn-danger" onclick="excluir(${p.id})">Excluir</button>
                ` : ""}
            </div>
        `;
        mural.appendChild(div);
    });

    // Chama a função para atualizar o número no topo
    atualizarContador(); 
}

function editar(id){
    let db = JSON.parse(localStorage.getItem("db"));
    let index = db.findIndex(p => p.id === id);
    let item = db[index];

    let novo = prompt("Editar texto da postagem:", item.texto);
    if(novo !== null){
        db[index].texto = novo;
        localStorage.setItem("db", JSON.stringify(db));
        carregar();
    }
}

function excluir(id){
    if(!confirm("Deseja excluir esta postagem?")) return;
    let db = JSON.parse(localStorage.getItem("db"));
    db = db.filter(p => p.id !== id);
    localStorage.setItem("db", JSON.stringify(db));
    carregar();
}

function toBase64(file){
    return new Promise((res, rej)=>{
        let r = new FileReader();
        r.readAsDataURL(file);
        r.onload = ()=>res(r.result);
        r.onerror = err => rej(err);
    });
}

window.onload = iniciar;
</script>

</body>
</html>
